<script>

// 👇 名单
let students = [
"吴翰宸","李锦康","童子虞","黄陈宇轩","季旭洋","孙羽浩","岑毅杰","肖訾轩",
"马关心","乔欣蓉","田馨儿","蔡静奕","曹天虹","王嘉木","丁昊宇","郑钰婷",
"施维","李天佑","陈枫元","蒋孜祺","陈思瑶","黄晨轩","刘大为","王茗扬",
"陈甜柔","顾子浩","赵紫馨","张宥达","杨博宇","宋佳宁","潮静语","陆君昊",
"张誉曈","陈乐文","张志浩","范奕辰","董俊屹","徐墨墨","尹雨佳","龚泓铭",
"范梓雯","姚迪瀚","李嘉雯","许墨墨"
];

let blacklist = ["许墨墨","蔡静奕","乔欣蓉","尹雨佳","潮静语","田馨儿"];

let activeStudents = students.filter(name => !blacklist.includes(name));

let count = {};
let current = "";
let timer = null;

students.forEach(name => count[name] = 0);

function start() {
    // 🔥 关键：无论如何先清掉旧的
    if (timer !== null) {
        clearInterval(timer);
        timer = null;
    }

    timer = setInterval(() => {
        current = activeStudents[Math.floor(Math.random() * activeStudents.length)];
        document.getElementById("name").innerText = current;
    }, 50);
}

function stop() {
    // 🔥 停止所有情况
    if (timer !== null) {
        clearInterval(timer);
        timer = null;
    }

    if (current) {
        count[current]++;
        updateStats();

        let msg = new SpeechSynthesisUtterance(current);
        speechSynthesis.cancel(); // 🔥 防止语音叠加
        speechSynthesis.speak(msg);
    }
}

function updateStats() {
    let text = "";
    for (let s of students) {
        text += s + "：" + count[s] + "次<br>";
    }
    document.getElementById("stats").innerHTML = text;
}

updateStats();

</script>
